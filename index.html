<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Kit - Energia</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-title" content="Gestão Kit">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#3498db">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --danger: #e74c3c; --dark: #2c3e50; --warning: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 15px; }
        .container { max-width: 1100px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Estilo do Logo e Título */
        .brand-header { text-align: center; margin-bottom: 20px; }
        .brand-logo { width: 100%; height: 200px; border-radius: 10px; object-fit: cover; border: 3px solid #f0f2f5; margin-bottom: 10px; background-color: #eee; }
        .brand-header h2 { margin: 0; color: var(--dark); font-size: 1.5rem; }
        
        .header-controls { 
            display: flex; flex-wrap: wrap; gap: 10px; background: #f8f9fa; 
            padding: 15px; border-radius: 10px; align-items: flex-end; margin-bottom: 20px; border: 1px solid #eee;
        }
        
        .control-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 140px; }
        label { font-size: 0.8rem; font-weight: bold; color: var(--dark); }
        input, select, textarea { padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; }
        
        .actions { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; justify-content: center; margin-top: 10px; }
        .btn { padding: 10px 15px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 0.8rem; flex: 1; min-width: 120px; }
        .btn-save { background-color: var(--success); }
        .btn-backup { background-color: var(--primary); }
        .btn-import { background-color: var(--warning); color: #333; }
        .btn-export { background-color: var(--dark); }
        
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 600px; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #666; font-size: 0.75rem; }
        
        .input-table { width: 70px; text-align: center; }
        .consumo-calculado { font-weight: bold; color: var(--primary); font-size: 1rem; }
        .pago-checkbox { width: 18px; height: 18px; cursor: pointer; }

        .anotacoes-section { margin-top: 30px; padding-top: 20px; border-top: 2px solid #f0f2f5; }
        .grid-anotacoes { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-top: 15px; }
        .card-kit { background: #fcfcfc; border: 1px solid #eee; padding: 15px; border-radius: 8px; }
        .card-kit h4 { margin: 0 0 10px 0; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        .fila-total { background-color: #f8f9fa; font-weight: bold; }
        .valor-soma { color: var(--danger); font-size: 1.2rem; }
        .chart-container { margin-top: 25px; height: 250px; }
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-header">
        <img src="icon.png" alt="Logo" class="brand-logo" onerror="this.src='https://via.placeholder.com/80?text=KITNETS'">
        <h2>Relatório Mensal</h2>
    </div>

    <div class="header-controls">
        <div class="control-group">
            <label>Data Leitura:</label>
            <input type="date" id="dataReferencia">
        </div>
        <div class="control-group">
            <label>Histórico:</label>
            <select id="buscaHistorico"></select>
        </div>
        <div class="control-group">
            <label>kWh (R$):</label>
            <input type="number" id="valorKwhGlobal" step="0.01" value="0.95" oninput="calcularTudo()">
        </div>
        <div class="actions">
            <button class="btn btn-save" onclick="salvarDados()">Salvar Mês</button>
            <button class="btn btn-backup" onclick="exportarBackup()">Gerar Backup</button>
            <button class="btn btn-import" onclick="document.getElementById('fileInput').click()">Importar</button>
            <input type="file" id="fileInput" accept=".json" onchange="importarBackup(event)">
            <button class="btn btn-export" onclick="exportarCSV()">Relatório CSV</button>
        </div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Unidade</th>
                    <th>Inquilino</th>
                    <th>L. Anterior</th>
                    <th>L. Atual</th>
                    <th>Gasto</th>
                    <th>Total</th>
                    <th>Pago?</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo"></tbody>
            <tfoot>
                <tr class="fila-total">
                    <td colspan="5" style="text-align: right;">SOMA TOTAL:</td>
                    <td class="valor-soma">R$ <span id="somaGeral">0,00</span></td>
                    <td></td>
                </tr>
            </tfoot>
        </table>
    </div>

    <div class="chart-container">
        <canvas id="graficoConsumo"></canvas>
    </div>

    <div class="anotacoes-section">
        <h3>Anotações e Controle</h3>
        <div class="grid-anotacoes" id="gridAnotacoes"></div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'gestao_kitnets_v6_final';
    let meuGrafico;

    function montarInterface() {
        let htmlTabela = "";
        let htmlCards = "";
        for (let i = 1; i <= 8; i++) {
            htmlTabela += `
                <tr>
                    <td><strong>Kit ${i}</strong></td>
                    <td><input type="text" id="nome-${i}" placeholder="Nome..." style="width:90px"></td>
                    <td><input type="number" id="ant-${i}" class="input-table" oninput="calcularTudo()"></td>
                    <td><input type="number" id="atu-${i}" class="input-table" oninput="calcularTudo()"></td>
                    <td><span id="gasto-${i}" class="consumo-calculado">0,0</span></td>
                    <td><span style="font-weight:bold">R$ <span id="res-${i}">0,00</span></span></td>
                    <td><input type="checkbox" id="pago-${i}" class="pago-checkbox"></td>
                </tr>`;
            htmlCards += `
                <div class="card-kit">
                    <h4>Kitnet ${i}</h4>
                    <label>Entrada (Data/Luz):</label>
                    <input type="text" id="entrada-${i}" style="width:95%; margin-bottom:5px; font-size:0.8rem">
                    <label>Saída (Data/Luz):</label>
                    <input type="text" id="saida-${i}" style="width:95%; margin-bottom:5px; font-size:0.8rem">
                    <label>Notas:</label>
                    <textarea id="obs-${i}" rows="2" style="width:95%; resize:none; font-size:0.8rem"></textarea>
                </div>`;
        }
        document.getElementById('tabelaCorpo').innerHTML = htmlTabela;
        document.getElementById('gridAnotacoes').innerHTML = htmlCards;
    }

    montarInterface();

    const campoData = document.getElementById('dataReferencia');
    campoData.value = new Date().toISOString().split('T')[0];
    
    campoData.addEventListener('change', carregarSessao);
    document.getElementById('buscaHistorico').addEventListener('change', function() {
        if(this.value) { campoData.value = this.value; carregarSessao(); }
    });

    function calcularTudo() {
        const valorKwh = parseFloat(document.getElementById('valorKwhGlobal').value) || 0;
        let acumuladoGeral = 0;
        let dadosGrafico = [];

        for (let i = 1; i <= 8; i++) {
            const ant = parseFloat(document.getElementById(`ant-${i}`).value) || 0;
            const atu = parseFloat(document.getElementById(`atu-${i}`).value) || 0;
            const displayGasto = document.getElementById(`gasto-${i}`);
            let gastoKwh = (atu - ant);
            
            if (atu > 0 && gastoKwh < 0) {
                displayGasto.innerText = "Erro";
                displayGasto.style.color = "red";
                document.getElementById(`res-${i}`).innerText = "0,00";
                dadosGrafico.push(0);
            } else {
                displayGasto.style.color = "var(--primary)";
                let gastoFormatado = Math.max(0, gastoKwh).toFixed(1);
                displayGasto.innerText = gastoFormatado.replace('.', ',');
                const valorDinheiro = parseFloat(gastoFormatado) * valorKwh;
                document.getElementById(`res-${i}`).innerText = valorDinheiro.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                acumuladoGeral += valorDinheiro;
                dadosGrafico.push(parseFloat(gastoFormatado));
            }
        }
        document.getElementById('somaGeral').innerText = acumuladoGeral.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        atualizarGrafico(dadosGrafico);
    }

    function salvarDados() {
        const dataKey = campoData.value;
        const historico = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        const dadosDia = { tarifa: document.getElementById('valorKwhGlobal').value, unidades: [] };

        for (let i = 1; i <= 8; i++) {
            dadosDia.unidades.push({
                id: i, nome: document.getElementById(`nome-${i}`).value,
                ant: document.getElementById(`ant-${i}`).value, atu: document.getElementById(`atu-${i}`).value,
                pago: document.getElementById(`pago-${i}`).checked, entrada: document.getElementById(`entrada-${i}`).value,
                saida: document.getElementById(`saida-${i}`).value, obs: document.getElementById(`obs-${i}`).value
            });
        }
        historico[dataKey] = dadosDia;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(historico));
        alert("Salvo com sucesso!");
        atualizarSelectHistorico();
    }

    function carregarSessao() {
        const dataKey = campoData.value;
        const historico = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        if (historico[dataKey]) {
            const d = historico[dataKey];
            document.getElementById('valorKwhGlobal').value = d.tarifa;
            d.unidades.forEach(u => {
                document.getElementById(`nome-${u.id}`).value = u.nome || "";
                document.getElementById(`ant-${u.id}`).value = u.ant || "";
                document.getElementById(`atu-${u.id}`).value = u.atu || "";
                document.getElementById(`pago-${u.id}`).checked = u.pago || false;
                document.getElementById(`entrada-${u.id}`).value = u.entrada || "";
                document.getElementById(`saida-${u.id}`).value = u.saida || "";
                document.getElementById(`obs-${u.id}`).value = u.obs || "";
            });
        } else {
            const datas = Object.keys(historico).sort().reverse();
            const ultimaData = datas.find(d => d < dataKey);
            for (let i = 1; i <= 8; i++) {
                document.getElementById(`atu-${i}`).value = "";
                document.getElementById(`pago-${i}`).checked = false;
                if (ultimaData) {
                    const pass = historico[ultimaData].unidades.find(x => x.id == i);
                    document.getElementById(`ant-${i}`).value = pass.atu;
                    document.getElementById(`nome-${i}`).value = pass.nome || "";
                    document.getElementById(`entrada-${i}`).value = pass.entrada || "";
                    document.getElementById(`saida-${i}`).value = pass.saida || "";
                    document.getElementById(`obs-${i}`).value = pass.obs || "";
                }
            }
        }
        calcularTudo();
    }

    function atualizarSelectHistorico() {
        const historico = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        const select = document.getElementById('buscaHistorico');
        const datas = Object.keys(historico).sort().reverse();
        select.innerHTML = '<option value="">-- Ver --</option>';
        datas.forEach(d => {
            let opt = document.createElement('option');
            opt.value = d; opt.text = d.split('-').reverse().join('/');
            select.add(opt);
        });
    }

    function atualizarGrafico(dados) {
        const ctx = document.getElementById('graficoConsumo').getContext('2d');
        if (meuGrafico) meuGrafico.destroy();
        meuGrafico = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['K1', 'K2', 'K3', 'K4', 'K5', 'K6', 'K7', 'K8'],
                datasets: [{ label: 'kWh', data: dados, backgroundColor: '#3498db' }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    function exportarBackup() {
        const dados = localStorage.getItem(STORAGE_KEY);
        if (!dados) return alert("Sem dados!");
        const blob = new Blob([dados], { type: 'application/json' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `backup_kitnets.json`;
        link.click();
    }

    function importarBackup(event) {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const json = JSON.parse(e.target.result);
                if (confirm("Sobrescrever dados atuais?")) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(json));
                    window.location.reload();
                }
            } catch (err) { alert("Arquivo inválido!"); }
        };
        reader.readAsText(event.target.files[0]);
    }

    function exportarCSV() {
        const historico = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        let csv = "Data;Kit;Inquilino;Ant;Atu;Gasto;Total;Pago\n";
        Object.keys(historico).sort().forEach(d => {
            historico[d].unidades.forEach(u => {
                let g = (u.atu - u.ant).toFixed(1);
                csv += `${d};Kit ${u.id};${u.nome};${u.ant};${u.atu};${g};${(g*historico[d].tarifa).toFixed(2)};${u.pago?'S':'N'}\n`;
            });
        });
        const blob = new Blob(["\ufeff"+csv], {type: 'text/csv;charset=utf-8;'});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "relatorio.csv";
        link.click();
    }

    atualizarSelectHistorico();
    carregarSessao();
</script>
</body>
</html>
